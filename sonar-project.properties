sonar.projectKey=gitlab-ci-validator
sonar.projectName=GitLab CI Validator & Simulator

sonar.sources=src,scripts
sonar.tests=src/__tests__
# Test files live under src/__tests__/ — exclude them from main sources so the
# same file isn't indexed twice (Sonar requires sources / tests to be disjoint).
sonar.exclusions=src/__tests__/**,public/schemas/**,dist/**,coverage/**,node_modules/**,.scannerwork/**

sonar.sourceEncoding=UTF-8

# JavaScript / TypeScript coverage — point at the LCOV report produced by Vitest.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Test files should not count toward coverage thresholds themselves.
sonar.coverage.exclusions=src/__tests__/**,src/main.tsx,src/types.ts,src/vite-env.d.ts,src/**/*.css,src/**/*.d.ts,scripts/**
